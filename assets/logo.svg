<svg width="860" height="300" viewBox="0 0 860 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Claude Omakase — The chef picks. You approve.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="860" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b1530"/>
      <stop offset="0.55" stop-color="#241a3d"/>
      <stop offset="1" stop-color="#2e1b34"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="180" y1="120" x2="820" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb46b"/>
      <stop offset="0.5" stop-color="#ff7a59"/>
      <stop offset="1" stop-color="#ff5277"/>
    </linearGradient>
    <linearGradient id="rice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9e4f2"/>
    </linearGradient>
    <linearGradient id="salmon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9a6b"/>
      <stop offset="1" stop-color="#ff6f61"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="848" height="288" rx="30" fill="url(#bg)" stroke="#ffffff" stroke-opacity="0.06"/>
  <rect x="6.5" y="6.5" width="847" height="287" rx="29.5" fill="none" stroke="#ff7a59" stroke-opacity="0.18"/>

  <!-- nigiri sushi mark -->
  <g filter="url(#soft)" transform="translate(430,60)">
    <!-- rice mound -->
    <path d="M -60 46 Q -60 22 -34 18 L 34 18 Q 60 22 60 46 Q 60 56 34 58 L -34 58 Q -60 56 -60 46 Z"
          fill="url(#rice)" stroke="#d9cfe8" stroke-opacity="0.45" stroke-width="1.5"/>
    <!-- individual rice grains hint -->
    <g fill="#cdbfe0" fill-opacity="0.45">
      <ellipse cx="-30" cy="48" rx="5" ry="3"/><ellipse cx="-12" cy="52" rx="5" ry="3"/>
      <ellipse cx="8" cy="49" rx="5" ry="3"/><ellipse cx="28" cy="52" rx="5" ry="3"/>
    </g>
    <!-- salmon slice draped over the top -->
    <path d="M -68 24 Q 0 -20 68 24 Q 56 40 0 36 Q -56 40 -68 24 Z" fill="url(#salmon)"/>
    <!-- glossy top highlight -->
    <path d="M -60 22 Q 0 -14 60 22" fill="none" stroke="#ffd9c9" stroke-opacity="0.7" stroke-width="2.5" stroke-linecap="round"/>
    <!-- salmon marbling stripes -->
    <g stroke="#fff1ea" stroke-opacity="0.75" stroke-width="2.5" fill="none" stroke-linecap="round">
      <path d="M -42 18 Q -34 9 -22 14"/>
      <path d="M -10 8 Q 0 2 12 8"/>
      <path d="M 24 14 Q 36 8 46 16"/>
    </g>
  </g>

  <!-- kicker -->
  <text x="430" y="178" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="20" letter-spacing="14" fill="#cbb8e6" fill-opacity="0.85">C L A U D E</text>

  <!-- wordmark -->
  <text x="430" y="238" text-anchor="middle"
        font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="76" font-weight="800" letter-spacing="6" fill="url(#wordmark)">OMAKASE</text>

  <!-- tagline -->
  <text x="430" y="272" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-style="italic"
        font-size="19" fill="#e7def5" fill-opacity="0.8">“The chef picks. You approve.”</text>
</svg>
