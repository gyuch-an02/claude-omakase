name: Catalog refresh

on:
  schedule:
    # daily at 07:00 UTC
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm ci --no-audit --no-fund
      - run: npm run build
        # --probe drops entries whose skill_files 404 so the daily refresh does
        # not commit uninstallable community entries.
      - run: npm run build:catalog -- --probe
        env:
          # Tokens live HERE — in CI, used only at federation (build) time. The
          # GITHUB_TOKEN is auto-injected by Actions (no setup); it lets the
          # github-skills adapter use code search. CLAUDE_OMAKASE_SKILLSMP_TOKEN
          # is an optional repo secret. These knobs expand the daily CI-side
          # skillsmp federation; end users NEVER need them because they read the
          # committed catalog.json, no upstream fetch.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_OMAKASE_SKILLSMP_TOKEN: ${{ secrets.CLAUDE_OMAKASE_SKILLSMP_TOKEN }}
          # Use most of the authenticated daily budget (500/day, 30/min). The
          # adapter spaces requests ~3s apart, so ~450 requests ≈ 22min — well
          # within a CI run, on a fresh daily quota (unlike a dev box that has
          # already spent the day's requests iterating).
          OMAKASE_SKILLSMP_MAX_REQUESTS: "450"
          OMAKASE_SKILLSMP_MAX_PAGES_PER_SEED: "6"
          OMAKASE_SKILLSMP_MAX_REQUESTS: "180"
          OMAKASE_SKILLSMP_MAX_PAGES_PER_SEED: "2"
      - name: Adapter smoke test
        run: npm run test:adapter -- --out adapter-smoke-report.json
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: adapter-smoke-report
          path: adapter-smoke-report.json
      - name: Open PR if catalog.json changed
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(catalog): daily federated refresh"
          branch: chore/catalog-refresh
          delete-branch: true
          title: "chore(catalog): daily federated refresh"
          body: |
            Automated catalog refresh from all configured adapters.

            Review the diff for entries that look wrong (typo'd descriptions,
            broken install commands, unknown publishers). Merge if happy.
          add-paths: |
            catalog.json
