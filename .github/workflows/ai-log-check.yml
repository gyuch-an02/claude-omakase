name: AI usage log check

# Flags pull requests that do not add an entry to docs/ai-log.md.
# See CLAUDE.md → "Skill: ai-usage-log".

on:
  pull_request:

jobs:
  ai-log-entry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for an ai-usage-log entry
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base" "$head" | grep -qx 'docs/ai-log.md'; then
            echo "docs/ai-log.md was updated in this PR."
          else
            echo "::warning::This PR does not update docs/ai-log.md. Every Claude-assisted change should append a Korean 5-sentence ai-usage-log entry (see CLAUDE.md)."
          fi
