name: publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
      # write: the release step below creates a GitHub Release for the tag.
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - run: npm install -g npm@latest && npm --version

      - run: npm ci

      - run: npm run build

      - name: Publish (npm OIDC Trusted Publishing)
        run: npm publish --access public --provenance
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

      # v0.7.1–v0.7.3 shipped to npm without a GitHub Release because this was
      # a manual step. Runs AFTER npm publish, so a failure here never blocks
      # the package — it just surfaces loudly in the run.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --notes "Full notes: [CHANGELOG.md](https://github.com/$GITHUB_REPOSITORY/blob/main/CHANGELOG.md)"
