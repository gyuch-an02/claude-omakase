name: Bug report
description: Something is broken or behaving unexpectedly
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: describe
    attributes:
      label: Describe the bug
      description: A clear description of what went wrong.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages verbatim.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Node.js version (`node --version`):
        - npm version (`npm --version`):
        - claude-omakase version (`npm view claude-omakase version`):
        - MCP host (Claude Code / Claude Desktop / other):
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant logs. Run Claude Code with verbose output if possible.
      render: shell
    validations:
      required: false
